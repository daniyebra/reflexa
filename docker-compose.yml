services:
  api:
    build: .
    command: uvicorn reflexa.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/reflexa.db
    volumes:
      - reflexa_data:/app/data
    restart: unless-stopped

  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    env_file: .env
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ui
    restart: unless-stopped

volumes:
  reflexa_data:
